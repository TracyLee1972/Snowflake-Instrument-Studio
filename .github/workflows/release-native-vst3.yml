name: Release Native VST3

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to package (e.g. v1.2.3 or v1.2.3-rc1)"
        required: true
        type: string
      publish_release:
        description: "Create GitHub Release and upload assets"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve-tag.outputs.tag_name }}
    steps:
      - name: Resolve tag
        id: resolve-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag_name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        env:
          TAG_NAME: ${{ steps.resolve-tag.outputs.tag_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9._]+)?$ ]]; then
            echo "Invalid release tag: '$TAG_NAME'"
            echo "Expected format: vMAJOR.MINOR.PATCH (optional suffix, e.g. v1.2.3-rc1)"
            exit 1
          fi
          echo "Tag validated: $TAG_NAME"

  build:
    name: Build ${{ matrix.os }}
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S native-vst3 -B native-vst3/build -G "Visual Studio 17 2022" -A x64

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S native-vst3 -B native-vst3/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build native-vst3/build --config Release --parallel

      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.validate-tag.outputs.tag_name }}
        run: |
          $tag = "$env:RELEASE_TAG"
          $outDir = "release-packages"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $vst3Path = "native-vst3/build/SnowflakeInstrumentStudio_artefacts/Release/VST3/Snowflake Instrument Studio.vst3"
          $standalonePath = "native-vst3/build/SnowflakeInstrumentStudio_artefacts/Release/Standalone"
          Compress-Archive -Path $vst3Path -DestinationPath "$outDir/SnowflakeInstrumentStudio-$tag-Windows-VST3.zip" -Force
          Compress-Archive -Path "$standalonePath/*" -DestinationPath "$outDir/SnowflakeInstrumentStudio-$tag-Windows-Standalone.zip" -Force

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        env:
          RELEASE_TAG: ${{ needs.validate-tag.outputs.tag_name }}
        run: |
          tag="$RELEASE_TAG"
          out_dir="release-packages"
          mkdir -p "$out_dir"
          vst3_path="native-vst3/build/SnowflakeInstrumentStudio_artefacts/Release/VST3/Snowflake Instrument Studio.vst3"
          standalone_path="native-vst3/build/SnowflakeInstrumentStudio_artefacts/Release/Standalone"
          ditto -c -k --sequesterRsrc --keepParent "$vst3_path" "$out_dir/SnowflakeInstrumentStudio-${tag}-macOS-VST3.zip"
          ditto -c -k --sequesterRsrc --keepParent "$standalone_path" "$out_dir/SnowflakeInstrumentStudio-${tag}-macOS-Standalone.zip"

      - name: Upload per-platform package
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}
          if-no-files-found: error
          path: release-packages/*.zip

  publish:
    name: Publish GitHub Release
    needs: [validate-tag, build]
    if: github.event_name == 'push' || inputs.publish_release == true
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-release-packages

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag_name }}
          generate_release_notes: true
          files: all-release-packages/**/*.zip
