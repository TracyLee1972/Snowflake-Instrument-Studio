name: Native VST3 Cross-Platform Build

on:
  workflow_dispatch:
  push:
    paths:
      - "native-vst3/**"
      - ".github/workflows/native-vst3-cross-platform.yml"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S native-vst3 -B native-vst3/build -G "Visual Studio 17 2022" -A x64

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S native-vst3 -B native-vst3/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build native-vst3/build --config Release --parallel

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SnowflakeInstrumentStudio-${{ runner.os }}
          if-no-files-found: error
          path: |
            native-vst3/build/SnowflakeInstrumentStudio_artefacts/Release/VST3/**
            native-vst3/build/SnowflakeInstrumentStudio_artefacts/Release/Standalone/**
